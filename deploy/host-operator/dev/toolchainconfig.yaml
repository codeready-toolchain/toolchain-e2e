apiVersion: toolchain.dev.openshift.com/v1alpha1
kind: ToolchainConfig
metadata:
  name: config
spec:
  host:
    automaticApproval:
      enabled: true
    deactivation:
      deactivationDomainsExcluded: '@redhat.com'
    registrationService:
      environment: 'dev'
    tiers:
      durationBeforeChangeTierRequestDeletion: '5s'
      defaultSpaceTier: 'base1ns'
  members:
    default:
      autoscaler:
        deploy: false
      memberStatus:
        refreshPeriod: "1s"
      environment: 'dev'
      webhook:
        secret:
          ref: 'member-operator-secret'
          virtualMachineAccessKey: 'vm.access'
